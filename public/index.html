<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Scanner - US Government Info</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .website-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .website-btn {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #666;
        }
        
        .website-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .website-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s ease;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
        }
        
        .send-btn:active {
            transform: translateY(0);
        }
        
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .chat-container {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #eee;
        }
        
        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.bot {
            text-align: left;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .typing {
            display: flex;
            gap: 4px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        
        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
        }
        
        .info-badge {
            display: inline-block;
            background: #e7f3ff;
            color: #0066cc;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .website-btn {
                min-width: 100px;
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .chat-container {
                max-height: 300px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Website Scanner</h1>
            <p>Ask questions about US Government websites - Powered by Ollama (Free, Local)</p>
        </div>
        
        <div class="website-selector">
            <button class="website-btn active" data-website="https://ph.usembassy.gov/">
                🏛️ US Embassy PH
            </button>
            <button class="website-btn" data-website="https://www.va.gov/">
                🏥 VA.gov
            </button>
        </div>
        
        <div id="status"></div>
        
        <div class="chat-container" id="chatContainer"></div>
        
        <div class="input-group">
            <label for="questionInput">Ask a question:</label>
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="questionInput" 
                    placeholder="E.g., What services are available?"
                    autocomplete="off"
                />
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    
    <script>
        let selectedWebsite = 'https://ph.usembassy.gov/';
        const chatContainer = document.getElementById('chatContainer');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        
        // Website selector
        document.querySelectorAll('.website-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.website-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedWebsite = btn.dataset.website;
                chatContainer.innerHTML = '';
                showStatus('Website switched', 'success', 2000);
            });
        });
        
        // Send message
        sendBtn.addEventListener('click', sendMessage);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const question = questionInput.value.trim();
            
            if (!question) return;
            
            // Add user message to chat
            addMessage(question, 'user');
            questionInput.value = '';
            sendBtn.disabled = true;
            
            // Add loading indicator
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.innerHTML = '<div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>';
            chatContainer.appendChild(loadingMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            try {
                showStatus('Querying AI...', 'loading');
                
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question,
                        website: selectedWebsite
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Query failed');
                }
                
                const data = await response.json();
                
                // Remove loading indicator
                loadingMsg.remove();
                
                // Add AI response
                const responseContainer = document.createElement('div');
                responseContainer.className = 'message bot';
                responseContainer.innerHTML = `
                    <div class="message-content">
                        ${escapeHtml(data.answer)}
                        <div class="info-badge">📍 ${data.context}</div>
                    </div>
                `;
                chatContainer.appendChild(responseContainer);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                showStatus('Response received', 'success', 2000);
            } catch (error) {
                loadingMsg.remove();
                showStatus('Error: ' + error.message, 'error', 4000);
                addMessage('Error: ' + error.message, 'bot');
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }
        
        function addMessage(text, role) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            messageEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
            chatContainer.appendChild(messageEl);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function showStatus(message, type, duration = 0) {
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            if (duration > 0) {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, duration);
            }
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        // Check API health on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (!data.ollamaConnected) {
                    showStatus('⚠️ Ollama is not running. Start Ollama first!', 'error');
                } else {
                    showStatus('✓ Connected to Ollama', 'success', 2000);
                }
            } catch (error) {
                showStatus('Could not connect to server', 'error');
            }
        });
    </script>
</body>
</html>
